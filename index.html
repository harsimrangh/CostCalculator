<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Distance Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
	

    <h2>City Distance Calculator</h2>

    <button id="loadBtn">
        📂 Load Local Properties File
    </button>

    <input
        type="file"
        id="fileInput"
        accept=".properties"
        style="display:none">

    <br><br>

    
		
		<textarea id="cities" wrap="soft"
		
        placeholder="Example:

Calgary, San Diego, Fresno, Portland">
    </textarea>

    <br><br>
	
	<label>
	    Cost Per Mile:
	</label>

	<input 
	    type="number"
	    id="costPerMile"
	    value="2.35"
	    step="0.01">

	<br><br>
	
	<label>
	    Quote:
	</label>

	<input 
	    type="number"
	    id="quote"
	    placeholder="Enter quote">


	<select id="quoteCurrency">

	<option value="CAD">CAD</option>

	<option value="USD">USD</option>

	</select>

	<br><br>

    <button onclick="calculate()">
        Calculate
    </button>

    <hr>

    <div id="results"></div>

</div>

<script src="script.js"></script>

</body>

</html>
